name: Test Suite

on:
    pull_request:
    push:
        branches:
            - main
    schedule:
        - cron: '0 2 * * *' # 2 AM UTC nightly
    workflow_dispatch:

jobs:
    test:
        name: Node.js ${{ matrix.node-version }} - Redis ${{ matrix.redis-version }}
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                node-version: [24]
                redis-version: ['latest', '7.4.0-v8']

        services:
            redis:
                image: redis/redis-stack-server:${{ matrix.redis-version }}
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Cache HuggingFace Models
              uses: actions/cache@v4
              with:
                  path: ~/.cache/huggingface
                  key: ${{ runner.os }}-huggingface-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-huggingface-

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Install redis-cli
              run: sudo apt-get update && sudo apt-get install -y redis-tools

            - name: Verify Redis connection
              run: |
                  redis-cli -h localhost -p 6379 ping
                  redis-cli -h localhost -p 6379 MODULE LIST

            - name: Run unit tests
              run: npm test -- tests/unit

            - name: Run integration tests
              run: npm test -- tests/integration

            - name: Run full test suite
              run: npm test

    build:
        name: Build Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build package
              run: npm run build

            - name: Check for build artifacts
              run: |
                  test -d dist
                  test -f dist/index.js
                  test -f dist/index.d.ts
