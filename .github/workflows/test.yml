name: Test Suite

on:
    pull_request:
    push:
        branches:
            - main
    schedule:
        - cron: '0 2 * * *' # 2 AM UTC nightly
    workflow_dispatch:
    workflow_call: # allow other workflows (e.g. release) to require this suite

# HuggingFace model cache: a stable path outside node_modules (which `npm ci` wipes).
env:
    HF_MODEL: Xenova/all-MiniLM-L6-v2
    HF_CACHE_DIR: ${{ github.workspace }}/.hf-cache
    HF_CACHE_KEY: hf-model-Xenova-all-MiniLM-L6-v2-v1

jobs:
    # Best-effort prime of the shared model cache (authenticated via HF_TOKEN to
    # dodge HF's per-IP 429s). Non-blocking: the matrix re-downloads on a cache miss.
    warm-cache:
        name: Pre-warm HuggingFace model cache
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Restore HuggingFace model cache
              id: cache
              uses: actions/cache/restore@v4
              with:
                  path: ${{ env.HF_CACHE_DIR }}
                  key: ${{ env.HF_CACHE_KEY }}

            - name: Setup Node.js
              if: steps.cache.outputs.cache-hit != 'true'
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Install dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: npm ci

            - name: Download model into shared cache
              id: download
              if: steps.cache.outputs.cache-hit != 'true'
              # Best-effort: a failed download must not fail the workflow.
              continue-on-error: true
              env:
                  HF_TOKEN: ${{ secrets.HF_TOKEN }}
              run: |
                  node --input-type=module <<'NODE'
                  import { pipeline } from '@huggingface/transformers';
                  await pipeline('feature-extraction', process.env.HF_MODEL, {
                      cache_dir: process.env.HF_CACHE_DIR,
                  });
                  NODE

            # Only write the key when the download succeeded, so a transient
            # failure never poisons the cache with partial files.
            - name: Save HuggingFace model cache
              if: steps.cache.outputs.cache-hit != 'true' && steps.download.outcome == 'success'
              uses: actions/cache/save@v4
              with:
                  path: ${{ env.HF_CACHE_DIR }}
                  key: ${{ env.HF_CACHE_KEY }}

    test:
        name: Node.js ${{ matrix.node-version }} - ${{ matrix.redis-image }}
        runs-on: ubuntu-latest
        # Run even if warm-cache failed; a cache miss re-downloads (authenticated).
        needs: warm-cache
        if: ${{ !cancelled() }}

        strategy:
            fail-fast: false
            matrix:
                node-version: [22, 23, 24]
                redis-image:
                    - redis/redis-stack-server:latest
                    - redis/redis-stack-server:7.4.0-v8

        services:
            redis:
                image: ${{ matrix.redis-image }}
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Restore HuggingFace model cache
              uses: actions/cache/restore@v4
              with:
                  path: ${{ env.HF_CACHE_DIR }}
                  key: ${{ env.HF_CACHE_KEY }}

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Install redis-cli
              run: sudo apt-get update && sudo apt-get install -y redis-tools

            - name: Verify Redis connection
              run: |
                  redis-cli -h localhost -p 6379 ping
                  redis-cli -h localhost -p 6379 MODULE LIST

            - name: Run unit tests
              run: npm test -- tests/unit

            - name: Run integration tests
              env:
                  REDISVL_SKIP_HYBRID: 'true'
                  HF_TOKEN: ${{ secrets.HF_TOKEN }}
              run: npm test -- tests/integration

            - name: Run full test suite
              env:
                  REDISVL_SKIP_HYBRID: 'true'
                  HF_TOKEN: ${{ secrets.HF_TOKEN }}
              run: npm test

    hybrid-test:
        name: HybridQuery - Redis 8.4
        runs-on: ubuntu-latest

        services:
            redis:
                image: redis:8.4
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Install redis-cli
              run: sudo apt-get update && sudo apt-get install -y redis-tools

            - name: Verify Redis connection
              run: |
                  redis-cli -h localhost -p 6379 ping
                  redis-cli -h localhost -p 6379 MODULE LIST

            - name: Run hybrid integration tests
              run: npm test -- tests/integration/hybrid-search.test.ts

    build:
        name: Build Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build package
              run: npm run build

            - name: Check for build artifacts
              run: |
                  test -d dist
                  test -f dist/index.js
                  test -f dist/index.d.ts
