services:
    redis:
        image: redis:8.0
        container_name: redisvl-dev
        ports:
            - '6379:6379'
        command: ['redis-server', '--save', '', '--appendonly', 'no']
        labels:
            com.redis.redisvl.dev: 'true'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 5
