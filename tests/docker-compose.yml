name: redisvl-typescript

services:
    redis:
        image: redis:8.0
        container_name: redisvl-test-redis
        ports:
            - '6379'
        command: redis-server --save "" --appendonly no
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 1s
            timeout: 3s
            retries: 30
